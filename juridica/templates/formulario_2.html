{% extends "base.html" %}
{% block contenido %}
{% load static %}

<link href="{% static 'css/sumario_form.css' %}" rel="stylesheet">

<div class="container">
    <h1>Formulario de Sumario Administrativo</h1>

    <form method="POST" id="form-oficio" enctype="multipart/form-data">
        {% csrf_token %}

        <fieldset>
            <legend>N° Correlativo</legend>
            <div class="row">
                <div>
                    <label>N°</label>
                    <input type="text" value="{{ registro_id }}" readonly disabled >
                </div>
                <!-- esto debe ser el ultimo + 1 para saber cual es el siguiente -->
            
                <div>
                    <label>Fecha</label>
                    <input name="fecha_creacion" type="date" required>
                </div>
            </div>
        </fieldset>
        

        <fieldset>
            <legend>D.A Instrucción Sumario</legend>
            <div class="row">
                <div>
                    <label>N°</label>
                    <input type="text" name="n_da" required>
                </div>
                <div>
                    <label>Fecha</label>
                    <input type="date" fecha name="fecha_da" required>
                </div>
                <div>
                    <label>Fiscal</label>
                    <input type="text" name="fiscal" required>
                </div>
                 <div>
                    <label>Grado del Fiscal</label>
                    <input type="text" name="grado_fiscal" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Materia</legend>
            <input type="text" name="materia" style="width:100%;">
        </fieldset>

        <fieldset>
            <legend>Nombre del posible Inculpado</legend>
            <div id="inculpados-container">
            <div class="row">
                <div>
                <label>Nombre</label>
                <input type="text" name="nombre[]" required>
                </div>
                <div>
                <label>Grado</label>
                <input type="text" name="grado[]" required>
                </div>
                <div class="attach-col">
                <button type="button" class="btn btn-rojo btn-tooltip btn-remove" style="display:none;" title="Eliminar">
                    ❌
                </button>
                </div>
            </div>
            </div>
            <button type="button" class="btn btn-azul btn-tooltip" id="btn-add-inculpado" style="margin-top: 10px;" title="Agregar Inculpado">
            ➕
            </button>
        </fieldset>


        <fieldset>
            <legend>Notificaciones Fiscal</legend>
            <div class="row">
                <div>
                    <label>Fecha</label>
                    <input type="date" name="fecha_notificacion_fiscal" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Vista Fiscal</legend>
            <div class="row">
                <div>
                    <label>Oficio</label>
                    <input type="text" name="oficio_vista_fiscal" required>
                </div>
                <div>
                    <label>Fecha</label>
                    <input type="date" name="fecha_vista_fiscal" required>
                </div>
                <div class="attach-col">
                    <div class="file-attach" data-name="adjunto_fiscalia">
                        <input class="file-attach__input" type="file" name="adjunto_fiscalia" hidden>

                        <button type="button" class="file-attach__btn file-attach__btn--select">
                        Adjuntar archivo
                        </button>

                        <span class="file-attach__status" aria-live="polite">
                        <span class="file-attach__check" aria-hidden="true">✓</span>
                        <span class="file-attach__text">Archivo cargado</span>
                        </span>

                        <span class="file-attach__filename"></span>

                        <button type="button" class="file-attach__btn file-attach__btn--change">
                        Cambiar
                        </button>
                    </div>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Etapa Actual</legend>
                <div class="row"> 
                    <div>
                        <label>Etapa</label>
                        <select name="sancion" required>
                            <option value="">-- Seleccionar etapa --</option>
                            {% for sancion in SACCIONES %}
                                <option value="{{ forloop.counter }}">{{ sancion }}</option>
                            {% endfor %}
                        </select>
                    </div>
                
                    <div class="attach-col">
                        <div class="file-attach" data-name="adjunto_sancion">
                            <input class="file-attach__input" type="file" name="adjunto_sancion" hidden>

                            <button type="button" class="file-attach__btn file-attach__btn--select">
                            Adjuntar archivo
                            </button>

                            <span class="file-attach__status" aria-live="polite">
                            <span class="file-attach__check" aria-hidden="true">✓</span>
                            <span class="file-attach__text">Archivo cargado</span>
                            </span>

                            <span class="file-attach__filename"></span>

                            <button type="button" class="file-attach__btn file-attach__btn--change">
                            Cambiar
                            </button>
                        </div>
                    </div>
                </div>

        </fieldset>

        <div class="actions">
                <button class="btn btn-azul btn-tooltip" type="submit" title="Guardar el oficio jurídico" style="position: relative;">💾</button>
        </div>

    </form>
</div>
<br>

<script src="/static/js/sumario.js"></script>

{% endblock %}
